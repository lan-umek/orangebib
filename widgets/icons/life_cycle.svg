<?xml version="1.0" encoding="UTF-8"?>
<svg width="48" height="48" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle -->
  <circle cx="24" cy="24" r="22" fill="#27ae60"/>
  
  <!-- S-curve (logistic growth) -->
  <path d="M8 38 Q8 35 10 32 Q14 26 18 24 Q22 22 26 18 Q30 14 34 12 Q38 10 40 10" 
        stroke="#ffffff" stroke-width="3" fill="none" stroke-linecap="round"/>
  
  <!-- Saturation line (K) -->
  <line x1="8" y1="10" x2="40" y2="10" stroke="#ffffff" stroke-width="1.5" stroke-dasharray="3,3"/>
  
  <!-- K label -->
  <text x="41" y="12" fill="#ffffff" font-size="8" font-weight="bold">K</text>
  
  <!-- Inflection point marker (Tm) -->
  <circle cx="22" cy="23" r="3" fill="#f39c12" stroke="#ffffff" stroke-width="1"/>
  
  <!-- Arrow showing growth direction -->
  <path d="M32 16 L36 12 L34 16 M36 12 L36 17" 
        stroke="#ffffff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Baseline -->
  <line x1="8" y1="40" x2="40" y2="40" stroke="#ffffff" stroke-width="1" opacity="0.5"/>
</svg>
