<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
  <!-- Document background -->
  <rect x="8" y="4" width="32" height="40" rx="2" fill="#f5f5f5" stroke="#bdbdbd" stroke-width="1"/>
  
  <!-- Text lines -->
  <line x1="12" y1="12" x2="36" y2="12" stroke="#e0e0e0" stroke-width="2"/>
  <line x1="12" y1="18" x2="36" y2="18" stroke="#e0e0e0" stroke-width="2"/>
  <line x1="12" y1="24" x2="28" y2="24" stroke="#e0e0e0" stroke-width="2"/>
  <line x1="12" y1="30" x2="36" y2="30" stroke="#e0e0e0" stroke-width="2"/>
  <line x1="12" y1="36" x2="24" y2="36" stroke="#e0e0e0" stroke-width="2"/>
  
  <!-- Highlighted keyword matches -->
  <rect x="12" y="10" width="12" height="5" fill="#4a90d9" opacity="0.4" rx="1"/>
  <rect x="28" y="16" width="8" height="5" fill="#4a90d9" opacity="0.4" rx="1"/>
  <rect x="12" y="28" width="10" height="5" fill="#4a90d9" opacity="0.4" rx="1"/>
  
  <!-- Concept tag/label -->
  <rect x="28" y="32" width="16" height="12" rx="3" fill="#4a90d9"/>
  <text x="36" y="41" font-size="8" fill="white" text-anchor="middle" font-weight="bold">C</text>
  
  <!-- Plus indicator -->
  <circle cx="40" cy="8" r="6" fill="#28a745"/>
  <line x1="40" y1="5" x2="40" y2="11" stroke="white" stroke-width="2"/>
  <line x1="37" y1="8" x2="43" y2="8" stroke="white" stroke-width="2"/>
</svg>
