<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <!-- Background -->
  <rect x="4" y="4" width="40" height="40" rx="4" fill="#dbeafe"/>
  
  <!-- Disruption symbol - lightning bolt -->
  <path d="M26 8 L16 24 L22 24 L20 40 L32 22 L26 22 L28 8 Z" 
        fill="#3b82f6" stroke="#1e40af" stroke-width="1"/>
  
  <!-- Plus and minus indicators -->
  <circle cx="38" cy="12" r="5" fill="#22c55e"/>
  <text x="38" y="15" text-anchor="middle" font-size="10" fill="white" font-weight="bold">+</text>
  
  <circle cx="10" cy="36" r="5" fill="#ef4444"/>
  <text x="10" y="39" text-anchor="middle" font-size="10" fill="white" font-weight="bold">−</text>
  
  <!-- Scale indicator -->
  <line x1="8" y1="44" x2="40" y2="44" stroke="#94a3b8" stroke-width="2"/>
  <circle cx="24" cy="44" r="2" fill="#1e40af"/>
</svg>
