<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <rect width="48" height="48" rx="8" fill="#eef2ff"/>
  <!-- Grid lines -->
  <line x1="14" y1="8"  x2="14" y2="40" stroke="#cbd5e1" stroke-width="0.5"/>
  <line x1="24" y1="8"  x2="24" y2="40" stroke="#cbd5e1" stroke-width="0.5"/>
  <line x1="34" y1="8"  x2="34" y2="40" stroke="#cbd5e1" stroke-width="0.5"/>
  <line x1="8"  y1="14" x2="40" y2="14" stroke="#cbd5e1" stroke-width="0.5"/>
  <line x1="8"  y1="24" x2="40" y2="24" stroke="#cbd5e1" stroke-width="0.5"/>
  <line x1="8"  y1="34" x2="40" y2="34" stroke="#cbd5e1" stroke-width="0.5"/>
  <!-- Association bubbles (sized = strength, coloured = direction) -->
  <circle cx="14" cy="14" r="5"   fill="#2563eb" opacity="0.8"/>
  <circle cx="24" cy="14" r="2.5" fill="#dc2626" opacity="0.6"/>
  <circle cx="34" cy="14" r="3.5" fill="#2563eb" opacity="0.7"/>
  <circle cx="14" cy="24" r="2"   fill="#dc2626" opacity="0.5"/>
  <circle cx="24" cy="24" r="5.5" fill="#2563eb" opacity="0.85"/>
  <circle cx="34" cy="24" r="1.5" fill="#dc2626" opacity="0.4"/>
  <circle cx="14" cy="34" r="3"   fill="#2563eb" opacity="0.65"/>
  <circle cx="24" cy="34" r="2"   fill="#dc2626" opacity="0.5"/>
  <circle cx="34" cy="34" r="4.5" fill="#16a34a" opacity="0.75"/>
  <!-- Entity labels (left) -->
  <rect x="2" y="11" width="5" height="6" rx="1" fill="#6366f1" opacity="0.7"/>
  <rect x="2" y="21" width="5" height="6" rx="1" fill="#6366f1" opacity="0.7"/>
  <rect x="2" y="31" width="5" height="6" rx="1" fill="#6366f1" opacity="0.7"/>
  <!-- Group labels (top) -->
  <rect x="11" y="2" width="6" height="4" rx="1" fill="#2563eb" opacity="0.6"/>
  <rect x="21" y="2" width="6" height="4" rx="1" fill="#dc2626" opacity="0.6"/>
  <rect x="31" y="2" width="6" height="4" rx="1" fill="#16a34a" opacity="0.6"/>
</svg>
