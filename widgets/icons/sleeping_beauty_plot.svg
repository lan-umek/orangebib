<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
  <!-- Chart background -->
  <rect x="4" y="4" width="40" height="40" fill="#f5f3ff" stroke="#7c3aed" stroke-width="1" rx="3"/>
  
  <!-- Grid lines -->
  <line x1="10" y1="12" x2="10" y2="38" stroke="#e5e7eb" stroke-width="0.5"/>
  <line x1="20" y1="12" x2="20" y2="38" stroke="#e5e7eb" stroke-width="0.5"/>
  <line x1="30" y1="12" x2="30" y2="38" stroke="#e5e7eb" stroke-width="0.5"/>
  <line x1="40" y1="12" x2="40" y2="38" stroke="#e5e7eb" stroke-width="0.5"/>
  
  <line x1="8" y1="18" x2="42" y2="18" stroke="#e5e7eb" stroke-width="0.5"/>
  <line x1="8" y1="26" x2="42" y2="26" stroke="#e5e7eb" stroke-width="0.5"/>
  <line x1="8" y1="34" x2="42" y2="34" stroke="#e5e7eb" stroke-width="0.5"/>
  
  <!-- Axes -->
  <line x1="8" y1="38" x2="42" y2="38" stroke="#374151" stroke-width="1.5"/>
  <line x1="8" y1="12" x2="8" y2="38" stroke="#374151" stroke-width="1.5"/>
  
  <!-- Citation trajectory 1 (purple - main) -->
  <polyline points="10,36 14,35 18,36 22,34 26,30 30,18 34,12 38,10" 
            fill="none" stroke="#7c3aed" stroke-width="2.5" stroke-linecap="round"/>
  
  <!-- Citation trajectory 2 (blue) -->
  <polyline points="10,34 14,34 18,33 22,32 26,28 30,20 34,16 38,14" 
            fill="none" stroke="#3b82f6" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
  
  <!-- Awakening markers -->
  <circle cx="30" cy="18" r="3" fill="#ef4444"/>
  <circle cx="30" cy="20" r="2.5" fill="#ef4444" opacity="0.7"/>
  
  <!-- Interactive indicator (hover point) -->
  <circle cx="22" cy="34" r="4" fill="none" stroke="#f59e0b" stroke-width="2"/>
  
  <!-- Sleep period indicator -->
  <line x1="10" y1="40" x2="26" y2="40" stroke="#a78bfa" stroke-width="2"/>
  
  <!-- Zzz -->
  <text x="12" y="10" font-family="Arial" font-size="6" font-weight="bold" fill="#7c3aed">z</text>
  <text x="16" y="8" font-family="Arial" font-size="4" font-weight="bold" fill="#a78bfa">z</text>
</svg>
