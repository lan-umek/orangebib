<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <!-- Background -->
  <rect x="2" y="2" width="44" height="44" rx="8" fill="#EBF5FF" stroke="#3B82F6" stroke-width="1.5"/>
  <!-- Table grid -->
  <line x1="7" y1="14" x2="41" y2="14" stroke="#CBD5E1" stroke-width="0.75"/>
  <line x1="7" y1="22" x2="41" y2="22" stroke="#CBD5E1" stroke-width="0.5"/>
  <line x1="7" y1="30" x2="41" y2="30" stroke="#CBD5E1" stroke-width="0.5"/>
  <line x1="7" y1="38" x2="41" y2="38" stroke="#CBD5E1" stroke-width="0.5"/>
  <line x1="16" y1="8" x2="16" y2="42" stroke="#CBD5E1" stroke-width="0.5"/>
  <!-- Group column headers -->
  <rect x="19" y="8" width="9" height="5" rx="1.5" fill="#3B82F6" opacity="0.85"/>
  <rect x="30" y="8" width="9" height="5" rx="1.5" fill="#F97316" opacity="0.85"/>
  <!-- Row labels -->
  <rect x="8" y="16" width="6" height="3" rx="1" fill="#6366f1" opacity="0.5"/>
  <rect x="8" y="24" width="6" height="3" rx="1" fill="#6366f1" opacity="0.5"/>
  <rect x="8" y="32" width="6" height="3" rx="1" fill="#6366f1" opacity="0.5"/>
  <!-- Data cells group 1 (blue) -->
  <text x="23.5" y="20" text-anchor="middle" fill="#3B82F6" font-size="6" font-weight="bold">42</text>
  <text x="23.5" y="28" text-anchor="middle" fill="#3B82F6" font-size="6" font-weight="bold">18</text>
  <text x="23.5" y="36" text-anchor="middle" fill="#3B82F6" font-size="6" font-weight="bold">7.3</text>
  <!-- Data cells group 2 (orange) -->
  <text x="34.5" y="20" text-anchor="middle" fill="#F97316" font-size="6" font-weight="bold">31</text>
  <text x="34.5" y="28" text-anchor="middle" fill="#F97316" font-size="6" font-weight="bold">24</text>
  <text x="34.5" y="36" text-anchor="middle" fill="#F97316" font-size="6" font-weight="bold">5.1</text>
  <!-- Sigma badge -->
  <circle cx="40" cy="8" r="5" fill="#3B82F6"/>
  <text x="40" y="11" text-anchor="middle" fill="white" font-size="8" font-weight="bold">Σ</text>
</svg>
