<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
  <defs>
    <linearGradient id="citDistGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4a90d9"/>
      <stop offset="100%" style="stop-color:#2c5aa0"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect x="4" y="4" width="40" height="40" rx="4" fill="url(#citDistGrad)"/>
  <!-- Histogram bars -->
  <rect x="8" y="30" width="5" height="10" fill="white" opacity="0.9" rx="1"/>
  <rect x="14" y="24" width="5" height="16" fill="white" opacity="0.9" rx="1"/>
  <rect x="20" y="16" width="5" height="24" fill="white" opacity="0.9" rx="1"/>
  <rect x="26" y="20" width="5" height="20" fill="white" opacity="0.9" rx="1"/>
  <rect x="32" y="28" width="5" height="12" fill="white" opacity="0.9" rx="1"/>
  <rect x="38" y="34" width="5" height="6" fill="white" opacity="0.9" rx="1"/>
  <!-- Distribution curve -->
  <path d="M8 32 Q16 10, 24 18 Q32 26, 42 36" stroke="#ffeb3b" stroke-width="2" fill="none" opacity="0.8"/>
  <!-- Mean line -->
  <line x1="24" y1="12" x2="24" y2="40" stroke="#ff5722" stroke-width="2" stroke-dasharray="3,2" opacity="0.8"/>
</svg>
