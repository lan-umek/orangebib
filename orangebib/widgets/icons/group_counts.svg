  <rect x="2" y="2" width="44" height="44" rx="8" fill="#EBF5FF" stroke="#3B82F6" stroke-width="1.5"/>
  <!-- Bar group 1 -->
  <rect x="8" y="28" width="5" height="12" rx="1" fill="#3B82F6"/>
  <rect x="14" y="24" width="5" height="16" rx="1" fill="#F97316"/>
  <!-- Bar group 2 -->
  <rect x="22" y="18" width="5" height="22" rx="1" fill="#3B82F6"/>
