  <!-- Comparison arrows -->
  <path d="M10 14 L16 14" stroke="#64748B" stroke-width="1" stroke-dasharray="2,1"/>
  <path d="M24 10 L30 10" stroke="#64748B" stroke-width="1" stroke-dasharray="2,1"/>
