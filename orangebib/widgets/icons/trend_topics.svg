<?xml version="1.0" encoding="UTF-8"?>
<svg width="48" height="48" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle -->
  <circle cx="24" cy="24" r="22" fill="#9b59b6"/>
  
  <!-- Timeline axis -->
  <line x1="8" y1="40" x2="42" y2="40" stroke="#ffffff" stroke-width="2"/>
  
  <!-- Trend line going up (showing emerging trend) -->
  <path d="M10 35 Q20 30 25 25 Q30 20 35 12" 
        stroke="#ffffff" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.5"/>
  
  <!-- Bubbles arranged diagonally (older topics at bottom-left, newer at top-right) -->
  <!-- Older topics (bottom) -->
  <circle cx="12" cy="34" r="3" fill="#440154"/>
  <circle cx="16" cy="32" r="4" fill="#31688e"/>
  
  <!-- Middle topics -->
  <circle cx="20" cy="28" r="3" fill="#21918c"/>
  <circle cx="24" cy="24" r="5" fill="#35b779"/>
  <circle cx="28" cy="20" r="4" fill="#5ec962"/>
  
  <!-- Newer/trending topics (top) -->
  <circle cx="32" cy="16" r="6" fill="#90d743"/>
  <circle cx="38" cy="10" r="5" fill="#fde725"/>
  
  <!-- Arrow indicating trend direction -->
  <polygon points="40,8 36,12 38,12 38,16 42,16 42,12 44,12" fill="#ffffff" opacity="0.8"/>
</svg>
