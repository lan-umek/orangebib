<?xml version="1.0" encoding="UTF-8"?>
<svg width="48" height="48" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle -->
  <circle cx="24" cy="24" r="22" fill="#3498db"/>
  
  <!-- Social media icons representation -->
  <!-- Twitter bird silhouette -->
  <circle cx="14" cy="14" r="5" fill="#1DA1F2" stroke="#ffffff" stroke-width="1"/>
  <text x="14" y="17" font-size="8" fill="#ffffff" text-anchor="middle">t</text>
  
  <!-- News icon -->
  <circle cx="34" cy="14" r="5" fill="#34495e" stroke="#ffffff" stroke-width="1"/>
  <rect x="31" y="12" width="6" height="4" fill="#ffffff" rx="1"/>
  
  <!-- Mendeley-style icon -->
  <circle cx="14" cy="34" r="5" fill="#A80D0D" stroke="#ffffff" stroke-width="1"/>
  <text x="14" y="37" font-size="8" fill="#ffffff" text-anchor="middle">M</text>
  
  <!-- Policy icon -->
  <circle cx="34" cy="34" r="5" fill="#27AE60" stroke="#ffffff" stroke-width="1"/>
  <rect x="32" y="31" width="4" height="6" fill="#ffffff"/>
  <polygon points="34,30 32,32 36,32" fill="#ffffff"/>
  
  <!-- Central attention score -->
  <circle cx="24" cy="24" r="8" fill="#f1c40f" stroke="#ffffff" stroke-width="2"/>
  <text x="24" y="28" font-size="10" fill="#2c3e50" text-anchor="middle" font-weight="bold">A</text>
  
  <!-- Connection lines -->
  <line x1="18" y1="18" x2="20" y2="20" stroke="#ffffff" stroke-width="1.5" opacity="0.7"/>
  <line x1="30" y1="18" x2="28" y2="20" stroke="#ffffff" stroke-width="1.5" opacity="0.7"/>
  <line x1="18" y1="30" x2="20" y2="28" stroke="#ffffff" stroke-width="1.5" opacity="0.7"/>
  <line x1="30" y1="30" x2="28" y2="28" stroke="#ffffff" stroke-width="1.5" opacity="0.7"/>
</svg>
