<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
  <!-- Background circle (moon) -->
  <circle cx="24" cy="24" r="20" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.5"/>
  
  <!-- Sleeping zzz -->
  <text x="32" y="14" font-family="Arial" font-size="8" font-weight="bold" fill="#7c3aed">z</text>
  <text x="36" y="10" font-family="Arial" font-size="6" font-weight="bold" fill="#a78bfa">z</text>
  <text x="39" y="7" font-family="Arial" font-size="4" font-weight="bold" fill="#c4b5fd">z</text>
  
  <!-- Citation line (flat then spike) -->
  <polyline points="8,32 14,32 18,31 22,32 26,30 30,20 34,12 38,10" 
            fill="none" stroke="#7c3aed" stroke-width="2.5" stroke-linecap="round"/>
  
  <!-- Sleep period bracket -->
  <line x1="8" y1="36" x2="26" y2="36" stroke="#94a3b8" stroke-width="1"/>
  <text x="14" y="41" font-family="Arial" font-size="5" fill="#64748b">sleep</text>
  
  <!-- Awakening marker -->
  <circle cx="30" cy="20" r="3" fill="#ef4444"/>
  <line x1="30" y1="24" x2="30" y2="36" stroke="#ef4444" stroke-width="1" stroke-dasharray="2,2"/>
  
  <!-- Document at base -->
  <rect x="10" y="28" width="8" height="10" fill="white" stroke="#7c3aed" stroke-width="1" rx="1"/>
  <line x1="12" y1="31" x2="16" y2="31" stroke="#7c3aed" stroke-width="0.5"/>
  <line x1="12" y1="33" x2="16" y2="33" stroke="#7c3aed" stroke-width="0.5"/>
  <line x1="12" y1="35" x2="15" y2="35" stroke="#7c3aed" stroke-width="0.5"/>
</svg>
