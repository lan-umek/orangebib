<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
  <!-- Classical building (Greek temple style) -->
  <!-- Pediment (roof) -->
  <polygon points="24,4 6,16 42,16" fill="#1565c0" stroke="#0d47a1" stroke-width="1"/>
  
  <!-- Entablature (beam) -->
  <rect x="6" y="16" width="36" height="4" fill="#1976d2"/>
  
  <!-- Columns -->
  <rect x="9" y="20" width="4" height="20" fill="#42a5f5" rx="1"/>
  <rect x="17" y="20" width="4" height="20" fill="#42a5f5" rx="1"/>
  <rect x="27" y="20" width="4" height="20" fill="#42a5f5" rx="1"/>
  <rect x="35" y="20" width="4" height="20" fill="#42a5f5" rx="1"/>
  
  <!-- Base -->
  <rect x="4" y="40" width="40" height="4" fill="#1976d2"/>
  
  <!-- Column capitals -->
  <rect x="8" y="19" width="6" height="2" fill="#1976d2"/>
  <rect x="16" y="19" width="6" height="2" fill="#1976d2"/>
  <rect x="26" y="19" width="6" height="2" fill="#1976d2"/>
  <rect x="34" y="19" width="6" height="2" fill="#1976d2"/>
  
  <!-- Concept indicators (small circles) -->
  <circle cx="11" cy="30" r="2" fill="#fff" opacity="0.9"/>
  <circle cx="19" cy="30" r="2" fill="#fff" opacity="0.9"/>
  <circle cx="29" cy="30" r="2" fill="#fff" opacity="0.9"/>
  
  <!-- Document indicator in corner -->
  <rect x="34" y="2" width="12" height="10" fill="white" stroke="#1565c0" stroke-width="1" rx="1"/>
  <line x1="36" y1="5" x2="44" y2="5" stroke="#1565c0" stroke-width="1"/>
  <line x1="36" y1="7" x2="42" y2="7" stroke="#1565c0" stroke-width="1"/>
  <line x1="36" y1="9" x2="44" y2="9" stroke="#1565c0" stroke-width="1"/>
</svg>
