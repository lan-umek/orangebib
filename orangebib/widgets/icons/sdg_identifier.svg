<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
  <!-- Globe base -->
  <circle cx="24" cy="24" r="18" fill="#e8f5e9" stroke="#4caf50" stroke-width="1.5"/>
  
  <!-- Globe lines -->
  <ellipse cx="24" cy="24" rx="18" ry="8" fill="none" stroke="#4caf50" stroke-width="0.8" opacity="0.5"/>
  <ellipse cx="24" cy="24" rx="8" ry="18" fill="none" stroke="#4caf50" stroke-width="0.8" opacity="0.5"/>
  <line x1="6" y1="24" x2="42" y2="24" stroke="#4caf50" stroke-width="0.8" opacity="0.5"/>
  <line x1="24" y1="6" x2="24" y2="42" stroke="#4caf50" stroke-width="0.8" opacity="0.5"/>
  
  <!-- SDG color ring segments (17 colors) -->
  <g transform="translate(24,24)">
    <!-- Simplified color wheel -->
    <path d="M0,-16 A16,16 0 0,1 9.4,-13" fill="none" stroke="#E5243B" stroke-width="4"/>
    <path d="M9.4,-13 A16,16 0 0,1 15.2,-5.6" fill="none" stroke="#DDA63A" stroke-width="4"/>
    <path d="M15.2,-5.6 A16,16 0 0,1 16,0" fill="none" stroke="#4C9F38" stroke-width="4"/>
    <path d="M16,0 A16,16 0 0,1 15.2,5.6" fill="none" stroke="#C5192D" stroke-width="4"/>
    <path d="M15.2,5.6 A16,16 0 0,1 9.4,13" fill="none" stroke="#FF3A21" stroke-width="4"/>
    <path d="M9.4,13 A16,16 0 0,1 0,16" fill="none" stroke="#26BDE2" stroke-width="4"/>
    <path d="M0,16 A16,16 0 0,1 -9.4,13" fill="none" stroke="#FCC30B" stroke-width="4"/>
    <path d="M-9.4,13 A16,16 0 0,1 -15.2,5.6" fill="none" stroke="#A21942" stroke-width="4"/>
    <path d="M-15.2,5.6 A16,16 0 0,1 -16,0" fill="none" stroke="#FD6925" stroke-width="4"/>
    <path d="M-16,0 A16,16 0 0,1 -15.2,-5.6" fill="none" stroke="#DD1367" stroke-width="4"/>
    <path d="M-15.2,-5.6 A16,16 0 0,1 -9.4,-13" fill="none" stroke="#FD9D24" stroke-width="4"/>
    <path d="M-9.4,-13 A16,16 0 0,1 0,-16" fill="none" stroke="#3F7E44" stroke-width="4"/>
  </g>
  
  <!-- Center SDG text -->
  <circle cx="24" cy="24" r="8" fill="white"/>
  <text x="24" y="27" font-size="7" fill="#333" text-anchor="middle" font-weight="bold">SDG</text>
  
  <!-- Search/identify indicator -->
  <circle cx="38" cy="10" r="6" fill="#4a90d9"/>
  <circle cx="38" cy="10" r="3" fill="none" stroke="white" stroke-width="1.5"/>
  <line x1="40" y1="12" x2="43" y2="15" stroke="white" stroke-width="1.5"/>
</svg>
