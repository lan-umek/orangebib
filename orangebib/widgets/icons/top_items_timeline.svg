<?xml version="1.0" encoding="UTF-8"?>
<svg width="48" height="48" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle -->
  <circle cx="24" cy="24" r="22" fill="#1abc9c"/>
  
  <!-- Timeline axis -->
  <line x1="10" y1="40" x2="42" y2="40" stroke="#ffffff" stroke-width="2"/>
  
  <!-- Entity rows (horizontal guide lines - subtle) -->
  <line x1="10" y1="12" x2="40" y2="12" stroke="#ffffff" stroke-width="0.5" opacity="0.3"/>
  <line x1="10" y1="20" x2="40" y2="20" stroke="#ffffff" stroke-width="0.5" opacity="0.3"/>
  <line x1="10" y1="28" x2="40" y2="28" stroke="#ffffff" stroke-width="0.5" opacity="0.3"/>
  
  <!-- Bubbles - different sizes and colors representing the timeline -->
  <!-- Row 1 -->
  <circle cx="14" cy="12" r="2" fill="#440154"/>
  <circle cx="22" cy="12" r="3" fill="#31688e"/>
  <circle cx="30" cy="12" r="5" fill="#35b779"/>
  <circle cx="38" cy="12" r="4" fill="#fde725"/>
  
  <!-- Row 2 -->
  <circle cx="18" cy="20" r="3" fill="#440154"/>
  <circle cx="26" cy="20" r="4" fill="#21918c"/>
  <circle cx="34" cy="20" r="6" fill="#fde725"/>
  
  <!-- Row 3 -->
  <circle cx="16" cy="28" r="4" fill="#31688e"/>
  <circle cx="24" cy="28" r="3" fill="#35b779"/>
  <circle cx="32" cy="28" r="5" fill="#90d743"/>
  <circle cx="38" cy="28" r="3" fill="#fde725"/>
</svg>
