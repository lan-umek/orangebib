<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
  <!-- Background -->
  <rect x="2" y="2" width="44" height="44" rx="4" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
  
  <!-- Group 1 - top left -->
  <circle cx="14" cy="14" r="8" fill="#3b82f6" opacity="0.8"/>
  <circle cx="12" cy="12" r="2" fill="white"/>
  <circle cx="16" cy="12" r="2" fill="white"/>
  <circle cx="14" cy="16" r="2" fill="white"/>
  
  <!-- Group 2 - top right -->
  <circle cx="34" cy="14" r="8" fill="#f59e0b" opacity="0.8"/>
  <circle cx="32" cy="12" r="2" fill="white"/>
  <circle cx="36" cy="12" r="2" fill="white"/>
  <circle cx="34" cy="16" r="2" fill="white"/>
  
  <!-- Group 3 - bottom center -->
  <circle cx="24" cy="34" r="8" fill="#22c55e" opacity="0.8"/>
  <circle cx="22" cy="32" r="2" fill="white"/>
  <circle cx="26" cy="32" r="2" fill="white"/>
  <circle cx="24" cy="36" r="2" fill="white"/>
  
  <!-- Connecting lines -->
  <line x1="20" y1="18" x2="28" y2="18" stroke="#6b7280" stroke-width="1.5" stroke-dasharray="2,2"/>
  <line x1="18" y1="20" x2="22" y2="28" stroke="#6b7280" stroke-width="1.5" stroke-dasharray="2,2"/>
  <line x1="30" y1="20" x2="26" y2="28" stroke="#6b7280" stroke-width="1.5" stroke-dasharray="2,2"/>
</svg>
